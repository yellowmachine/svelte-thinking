services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scholarly
      POSTGRES_PASSWORD: scholarly_test
      POSTGRES_DB: scholio_test
      APP_DB_USER: scholarly_app
      APP_DB_PASSWORD: scholarly_app_test
    ports:
      - '5434:5432'
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./scripts/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scholarly']
      interval: 5s
      timeout: 3s
      retries: 5
