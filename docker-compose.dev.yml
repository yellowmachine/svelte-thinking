services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scholio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scholio_dev}
      POSTGRES_DB: ${POSTGRES_DB:-scholio}
      APP_DB_USER: ${APP_DB_USER:-scholio_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-scholio_app_dev}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-scholio}']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_dev_data:/data

  typst:
    build:
      context: ./typst-service
    restart: unless-stopped
    ports:
      - '3100:3100'

  embed:
    build:
      context: ./embed-service
    restart: unless-stopped
    ports:
      - '3200:3200'

volumes:
  postgres_dev_data:
    name: scholio_postgres_dev
  minio_dev_data:
    name: scholio_minio_dev
