<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#2C1E14"/>

  <!-- Open book — two pages with a central spine, minimal and clean -->
  <!-- Left page -->
  <path d="M256 160
             C230 152 188 148 148 152
             L140 352
             C180 348 228 352 256 364
             Z"
        fill="none" stroke="#E8DDD0" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Right page -->
  <path d="M256 160
             C282 152 324 148 364 152
             L372 352
             C332 348 284 352 256 364
             Z"
        fill="none" stroke="#E8DDD0" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Annotation mark on left page — a small horizontal line suggesting margin notes -->
  <line x1="168" y1="220" x2="238" y2="214" stroke="#C4965A" stroke-width="10" stroke-linecap="round"/>
  <line x1="172" y1="252" x2="236" y2="247" stroke="#C4965A" stroke-width="10" stroke-linecap="round"/>
  <line x1="176" y1="284" x2="234" y2="280" stroke="#E8DDD0" stroke-width="7" stroke-linecap="round" opacity="0.5"/>

  <!-- Annotation mark on right page -->
  <line x1="274" y1="214" x2="344" y2="220" stroke="#E8DDD0" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <line x1="276" y1="247" x2="340" y2="252" stroke="#E8DDD0" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
</svg>
