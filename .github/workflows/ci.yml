name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check · Build · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          # Runtime secrets are injected at startup, not needed at build time.
          # PUBLIC_* vars are baked in at build — leave empty for CI.
          PUBLIC_SENTRY_DSN: ""

      - name: Test (server)
        run: bun run vitest run --project server
